name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run test suite
      env:
        ABRAFLEXI_URL: ${{ secrets.ABRAFLEXI_URL }}
        ABRAFLEXI_LOGIN: ${{ secrets.ABRAFLEXI_LOGIN }}
        ABRAFLEXI_PASSWORD: ${{ secrets.ABRAFLEXI_PASSWORD }}
        ABRAFLEXI_COMPANY: ${{ secrets.ABRAFLEXI_COMPANY }}
        EASE_EMAILTO: ${{ secrets.EASE_EMAILTO }}
        REMIND_FROM: ${{ secrets.REMIND_FROM }}
        MUTE: "true"
      run: composer run-script test
